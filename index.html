/* ═══════════════════════════════════════════
   ★ DB 테이블: member_daily

const getLS=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k))||fb}catch{return fb}};
const setLS=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const toMin=t=>{if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m};

const sessHrs=s=>((s.study_hours||0)+(s.study_minutes||0)/60);
const totalSessHrs=arr=>(arr||[]).reduce((sum,s)=>sum+sessHrs(s),0);
const fmtHM=dec=>{
  if(!dec||dec<=0)return'0h';
  const h=Math.floor(dec),m=Math.round((dec-h)*60);
  if(h>0&&m>0)return`${h}h ${m}m`;
  return h>0?`${h}h`:`${m}m`;
};
const fmtShort=dec=>{
  if(!dec||dec<=0)return'0';
  const h=Math.floor(dec),m=Math.round((dec-h)*60);
  if(h>0&&m>0)return`${h}h${m}m`;
  return h>0?`${h}h`:`${m}m`;
};
const getMonthDays=(y,m)=>{
  const first=new Date(y,m,1),last=new Date(y,m+1,0),sd=first.getDay(),d=[];
  for(let i=0;i<sd;i++)d.push(null);
  for(let i=1;i<=last.getDate();i++)d.push(i);
  return d;
};
const getWeekDates=base=>{
  const d=new Date(base),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().slice(0,10);});
};
const fmtDate=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function Confetti({active,baseColor}){

}
function Fireworks({active,color}){
  const[pts,setPts]=useState([]);
  useEffect(()=>{
    if(!active){setPts([]);return;}
    const cs=[color,'#fbbf24','#f472b6','#60a5fa','#a855f7','#34d399','#f97316'],b=[];
    for(let k=0;k<5;k++){const cx=15+Math.random()*70,cy=15+Math.random()*40;for(let i=0;i<14;i++){const a=(Math.PI*2/14)*i,d=40+Math.random()*40;b.push({id:`${k}-${i}`,cx,cy,fx:Math.cos(a)*d,fy:Math.sin(a)*d,size:3+Math.random()*4,color:cs[Math.floor(Math.random()*cs.length)],delay:k*0.25,br:Math.random()>0.5?'50%':'2px'});}}
    setPts(b);const t=setTimeout(()=>setPts([]),2500);return()=>clearTimeout(t);
  },[active,color]);
  if(!pts.length)return null;
  return(<div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">{pts.map(p=>(<div key={p.id} className="absolute firework-particle" style={{left:`${p.cx}%`,top:`${p.cy}%`,width:p.size,height:p.size,borderRadius:p.br,backgroundColor:p.color,'--fx':`${p.fx}px`,'--fy':`${p.fy}px`,animationDelay:`${p.delay}s`}}/>))}{Array.from({length:8},(_,i)=>(<div key={`s${i}`} className="absolute sparkle-star text-2xl" style={{left:`${10+Math.random()*80}%`,top:`${5+Math.random()*50}%`,animationDelay:`${i*0.2}s`}}>{['✨','🎆','🎇','⭐','🌟','💫','🎉','🎊'][i]}</div>))}</div>);
}
const Ic=({children,size=20,color="currentColor",className="",...r})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...r}>{children}</svg>);
const PlusIc=p=><Ic {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Ic>;
const MinusIc=p=><Ic {...p}><line x1="5" y1="12" x2="19" y2="12"/></Ic>;
const XIcon=p=><Ic {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Ic>;
const ChevL=p=><Ic {...p}><polyline points="15 18 9 12 15 6"/></Ic>;
const ChevR=p=><Ic {...p}><polyline points="9 6 15 12 9 18"/></Ic>;

                  <div className="flex items-center gap-1.5">{md.cafe&&<span className="w-7 h-7 rounded-lg bg-amber-100 flex items-center justify-center text-sm">☕</span>}{md.swim&&<span className="w-7 h-7 rounded-lg bg-cyan-100 flex items-center justify-center text-sm">🏊</span>}</div>
                </div>
                {md.sessions.length>0?(<div className="space-y-1.5"><p className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">공부 세션</p>{md.sessions.map((s,i)=>(<div key={i} className="flex items-center justify-between bg-white/80 rounded-lg px-3 py-2"><div className="flex items-center gap-2"><span className="w-1.5 h-5 rounded-full" style={{backgroundColor:m.color}}/><span className="text-sm text-slate-700 font-medium">{s.study_content||'(무제)'}</span></div><span className="text-sm font-bold" style={{color:m.color}}>{(s.study_hours||0)>0&&`${s.study_hours}h `}{(s.study_minutes||0)>0&&`${s.study_minutes}m`}{!(s.study_hours||0)&&!(s.study_minutes||0)&&'0h'}</span></div>))}<div className="flex justify-end pt-1 border-t border-slate-200/50"><span className="text-xs font-extrabold" style={{color:m.color}}>합계 {fmtHM(tot)}</span></div></div>):(<p className="text-xs text-slate-400 ml-1">공부 기록 없음</p>)}
              </div>);
          })}

/* ══════════════════════════════════════════════
   ★ Supabase Data Layer
   ──────────────────────────────────────────────
   member_daily 테이블 구조:
     id, member_name, date,
     wake_up_time, cafe_visited, swimming_done,
     study_content, study_hours, study_minutes

   한 사람이 하루에 여러 공부 항목 → 여러 ROW
   루틴(기상/카페/수영)은 같은 (member+date)의
   모든 ROW에 동일 값으로 유지
   ══════════════════════════════════════════════ */

// DB rows → { [date]: { [member_name]: { wakeTime, cafe, swim, sessions:[{id,study_content,study_hours,study_minutes}] } } }
function rowsToAllData(rows){
  const out={};
  (rows||[]).forEach(r=>{
    const d=r.date, mn=r.member_name;
    if(!d||!mn)return;
    if(!out[d])out[d]={};
    if(!out[d][mn])out[d][mn]={wakeTime:'',cafe:false,swim:false,sessions:[]};
    const md=out[d][mn];
    // 루틴: 값이 있으면 덮어쓰기 (모든 row에 동일한 값이니 어떤 것을 써도 OK)
    if(r.wake_up_time) md.wakeTime=r.wake_up_time;
    if(r.cafe_visited) md.cafe=true;
    if(r.swimming_done) md.swim=true;
    // 공부 세션: study_content가 있는 row만 세션으로 추가
    if(r.study_content||r.study_hours||r.study_minutes){
      md.sessions.push({
        id:r.id, // DB row id — 수정/삭제에 사용
        study_content:r.study_content||'',
        study_hours:r.study_hours||0,
        study_minutes:r.study_minutes||0,
      });
    }
  });
  return out;
}

function useSupabase(){
  const[allData,setAllData]=useState({});
  const[synced,setSynced]=useState(false);
  const[error,setError]=useState(null);

  const fetchAll=useCallback(async()=>{
    const{data,error:e}=await sb.from('member_daily').select('*').order('id',{ascending:true});
    if(e){setError(e.message);console.error('Fetch error:',e);return;}
    setAllData(rowsToAllData(data));
    setSynced(true);
    setError(null);
  },[]);

  // 최초 로드
  useEffect(()=>{fetchAll();},[fetchAll]);

  // 실시간 구독
  useEffect(()=>{
    const channel=sb.channel('member-daily-realtime')
      .on('postgres_changes',{event:'*',schema:'public',table:'member_daily'},()=>{
        fetchAll(); // 어떤 변경이든 전체 re-fetch
      })
      .subscribe();
    return()=>{sb.removeChannel(channel);};
  },[fetchAll]);

  // ── 루틴 저장 (기상/카페/수영) ──
  // 해당 member+date의 모든 row를 업데이트
  // row가 없으면 빈 공부세션 row 하나 INSERT
  const saveRoutine=useCallback(async(memberName,date,field,value)=>{
    // DB 컬럼명 매핑
    const colMap={wakeTime:'wake_up_time',cafe:'cafe_visited',swim:'swimming_done'};
    const col=colMap[field];
    if(!col)return;

    // Optimistic UI
    setAllData(prev=>{
      const next={...prev};
      if(!next[date])next[date]={};
      if(!next[date][memberName])next[date][memberName]={wakeTime:'',cafe:false,swim:false,sessions:[]};
      next[date][memberName]={...next[date][memberName],[field]:value};
      return next;
    });

    // 기존 row가 있는지 확인
    const{data:existing}=await sb.from('member_daily')
      .select('id').eq('member_name',memberName).eq('date',date);

    if(existing&&existing.length>0){
      // 모든 row 업데이트
      await sb.from('member_daily')
        .update({[col]:value})
        .eq('member_name',memberName).eq('date',date);
    }else{
      // row가 없으면 새로 INSERT (빈 공부세션)
      await sb.from('member_daily').insert({
        member_name:memberName, date,
        wake_up_time:field==='wakeTime'?value:'',
        cafe_visited:field==='cafe'?value:false,
        swimming_done:field==='swim'?value:false,
        study_content:'', study_hours:0, study_minutes:0,
      });
    }
  },[]);

  // ── 공부 세션 추가 ──
  const addSession=useCallback(async(memberName,date,contentName)=>{
    // 현재 루틴 값을 가져와서 새 row에도 복제
    const cur=allData[date]?.[memberName]||{wakeTime:'',cafe:false,swim:false};

    // Optimistic
    const tempId=Date.now();
    setAllData(prev=>{
      const next={...prev};
      if(!next[date])next[date]={};
      if(!next[date][memberName])next[date][memberName]={wakeTime:cur.wakeTime,cafe:cur.cafe,swim:cur.swim,sessions:[]};
      next[date][memberName].sessions=[...next[date][memberName].sessions,
        {id:tempId,study_content:contentName,study_hours:0,study_minutes:0}];
      return next;
    });

    const{data}=await sb.from('member_daily').insert({
      member_name:memberName, date,
      wake_up_time:cur.wakeTime||'',
      cafe_visited:!!cur.cafe,
      swimming_done:!!cur.swim,
      study_content:contentName, study_hours:0, study_minutes:0,
    }).select().single();

    // temp id → 실제 id
    if(data){
      setAllData(prev=>{
        const next={...prev};
        const md=next[date]?.[memberName];
        if(md) md.sessions=md.sessions.map(s=>s.id===tempId?{...s,id:data.id}:s);
        return next;
      });
    }
  },[allData]);

  // ── 세션 수정 (항목명, 시간, 분) ──
  const updateSession=useCallback(async(rowId,field,value)=>{
    // field: 'study_content'|'study_hours'|'study_minutes'
    // Optimistic
    setAllData(prev=>{
      const next={...prev};
      for(const d of Object.keys(next)){
        for(const mn of Object.keys(next[d])){
          const md=next[d][mn];
          md.sessions=md.sessions.map(s=>s.id===rowId?{...s,[field]:value}:s);
        }
      }
      return next;
    });

    await sb.from('member_daily').update({[field]:value}).eq('id',rowId);
  },[]);

  // ── 세션 삭제 ──
  const deleteSession=useCallback(async(rowId)=>{
    setAllData(prev=>{
      const next={...prev};
      for(const d of Object.keys(next)){
        for(const mn of Object.keys(next[d])){
          next[d][mn].sessions=next[d][mn].sessions.filter(s=>s.id!==rowId);
        }
      }
      return next;
    });
    await sb.from('member_daily').delete().eq('id',rowId);
  },[]);

  const getMember=(memberName,date)=>
    allData[date]?.[memberName]||{wakeTime:'',cafe:false,swim:false,sessions:[]};

  return{allData,synced,error,saveRoutine,addSession,updateSession,deleteSession,getMember,fetchAll};
}

/* ══════════════ MAIN APP ══════════════ */
function App(){
  const today=TODAY();
  const{allData,synced,error,saveRoutine,addSession,updateSession,deleteSession,getMember}=useSupabase();

  const[tab,setTab]=useState('calendar');
  const[selectedMember,setSelectedMember]=useState('둘째');

  const[foodYear,setFoodYear]=useState(()=>new Date().getFullYear());
  const[foodMonth,setFoodMonth]=useState(()=>new Date().getMonth());

  const deleteFoodItem=id=>saveFood(foodData.filter(f=>f.id!==id));
  const foodMonthKey=`${foodYear}-${String(foodMonth+1).padStart(2,'0')}`;
  const foodMonthItems=foodData.filter(f=>f.date.startsWith(foodMonthKey)).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  const foodMonthTotal=foodMonthItems.reduce((s,f)=>s+(f.amount||0),0);
  const fmtWon=n=>n.toLocaleString('ko-KR');

  const weekDates=useMemo(()=>getWeekDates(today),[today]);
  const weekStudy=useMemo(()=>{
    return MEMBERS.map(m=>{
      let total=0;
      weekDates.forEach(d=>{
        const md=allData[d]?.[m.id];
        if(md?.sessions) total+=totalSessHrs(md.sessions);
      });
      return{...m,total:Math.round(total*100)/100};
    }).sort((a,b)=>b.total-a.total);
  },[allData,weekDates]);
  const maxStudy=Math.max(...weekStudy.map(w=>w.total),0.01);
  const calDays=useMemo(()=>getMonthDays(calYear,calMonth),[calYear,calMonth]);

  const fireConfetti=(member,type)=>{setConfetti({member,type});setTimeout(()=>setConfetti(null),1500);};

  useEffect(()=>{
    if(tab==='ranking'&&prevTabRef.current!=='ranking'&&weekStudy[0]?.total>0){setShowFireworks(true);setTimeout(()=>setShowFireworks(false),2500);}
    prevTabRef.current=tab;
  },[tab,weekStudy]);

  const mem=MEMBERS.find(m=>m.id===selectedMember);

  return(
    <div className="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100">
      <Fireworks active={showFireworks} color={weekStudy[0]?.color||'#fbbf24'}/>

      <header className="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-2xl">👨‍👩‍👦</span>
              <div><h1 className="text-base font-extrabold text-slate-800 tracking-tight">Family Study Tracker</h1><p className="text-[10px] text-slate-400 font-medium">{today}</p></div>
            </div>
            <div className="flex items-center gap-2">
              {/* 연결 상태 */}
              <div className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-semibold ${
                error?'bg-red-50 text-red-500':synced?'bg-green-50 text-green-600':'bg-yellow-50 text-yellow-600'}`}>
                <span className={`w-1.5 h-1.5 rounded-full ${error?'bg-red-500':synced?'bg-green-500 pulse-dot':'bg-yellow-500 pulse-dot'}`}/>
                {error?'연결 오류':synced?'실시간 연결':'동기화 중...'}
              </div>
              {MEMBERS.map(m=>(<div key={m.id} className="w-7 h-7 rounded-full flex items-center justify-center text-sm border-2" style={{borderColor:m.color,backgroundColor:m.bg}}>{m.emoji}</div>))}
            </div>
          </div>
          <nav className="flex gap-1 mt-2 -mb-px">
            {[['calendar','📅 달력'],['input','✏️ 입력'],['ranking','🏆 랭킹'],['food','🍽️ 식비']].map(([k,label])=>(
              <button key={k} onClick={()=>setTab(k)} className={`px-4 py-2 text-xs font-semibold rounded-t-lg border-b-2 transition-all ${tab===k?'border-slate-800 text-slate-800 bg-slate-50':'border-transparent text-slate-400 hover:text-slate-600'}`}>{label}</button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-5">

        {/* ════════ CALENDAR ════════ */}
        {tab==='calendar'&&(
          <div className="anim-slide">
            <div className="flex items-center justify-between mb-4">
              <button onClick={()=>{let nm=calMonth-1,ny=calYear;if(nm<0){nm=11;ny--;}setCalMonth(nm);setCalYear(ny);}} className="w-9 h-9 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 active:scale-95"><ChevL size={16} color="#475569"/></button>
              <div className="text-center"><span className="text-lg font-bold text-slate-800">{calYear}년 {calMonth+1}월</span><button onClick={()=>{setCalYear(new Date().getFullYear());setCalMonth(new Date().getMonth())}} className="block mx-auto text-[10px] text-blue-500 hover:underline mt-0.5">이번 달</button></div>

            </div>
            <div className="flex flex-wrap gap-3 mb-3 px-1">
              {MEMBERS.map(m=>(<span key={m.id} className="flex items-center gap-1 text-xs text-slate-500"><span className="w-2.5 h-2.5 rounded-full inline-block" style={{backgroundColor:m.color}}/> {m.name}</span>))}
              <span className="text-xs text-slate-400 ml-auto">날짜를 눌러 상세 보기</span>
            </div>
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="grid grid-cols-7 border-b border-slate-100">{DAYS.map((d,i)=>(<div key={d} className={`py-2 text-center text-xs font-semibold ${i===0?'text-red-400':i===6?'text-blue-400':'text-slate-400'}`}>{d}</div>))}</div>
              <div className="grid grid-cols-7">
                {calDays.map((day,i)=>{
                  if(day===null)return<div key={`e${i}`} className="cal-cell border-b border-r border-slate-50 cursor-default"/>;

                    <div key={i} onClick={()=>setSelectedDate(ds)} className={`cal-cell border-b border-r border-slate-50 p-1 relative hover:bg-blue-50/40 ${isT?'bg-blue-50/60':''}`}>
                      <span className={`text-[11px] font-semibold block leading-tight ${isT?'text-white bg-blue-500 w-5 h-5 rounded-full flex items-center justify-center':dow===0?'text-red-400':dow===6?'text-blue-400':'text-slate-500'}`}>{day}</span>
                      <div className="mt-0.5 space-y-px">{MEMBERS.map(m=>{const md=allData[ds]?.[m.id];if(!md||(!md.cafe&&!md.swim))return null;return(<div key={m.id} className="flex items-center gap-px"><span className="w-1.5 h-1.5 rounded-full shrink-0" style={{backgroundColor:m.color}}/><span className="text-[10px] leading-none">{md.cafe&&'☕'}{md.swim&&'🏊'}</span></div>);})}</div>
                      {(()=>{const has=MEMBERS.some(m=>totalSessHrs(allData[ds]?.[m.id]?.sessions)>0);if(!has)return null;return(<div className="flex gap-0.5 mt-0.5 flex-wrap">{MEMBERS.map(m=>{const h=totalSessHrs(allData[ds]?.[m.id]?.sessions);if(h<=0)return null;return<span key={m.id} className="text-[8px] font-bold px-0.5 rounded" style={{color:m.color,backgroundColor:m.bg}}>{fmtShort(h)}</span>;})}</div>);})()}
                    </div>);
                })}
              </div>
            </div>
          </div>
        )}

        {/* ════════ INPUT ════════ */}
        {tab==='input'&&(
          <div className="anim-slide space-y-4">
            <div className="flex gap-2">
              {MEMBERS.map(m=>(<button key={m.id} onClick={()=>setSelectedMember(m.id)} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-semibold text-sm transition-all border-2 ${selectedMember===m.id?'text-white shadow-lg scale-[1.02]':'bg-white text-slate-500 border-slate-100 hover:border-slate-200'}`} style={selectedMember===m.id?{backgroundColor:m.color,borderColor:m.color,boxShadow:`0 8px 24px ${m.color}30`}:{}}><span className="text-lg">{m.emoji}</span> {m.name}</button>))}
            </div>
            {(()=>{
              const md=getMember(selectedMember,today);
              const totalH=totalSessHrs(md.sessions);
              return(
                <div className="space-y-4">
                  {/* 기상 시간 */}
                  <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                    <div className="flex items-center gap-3 mb-3"><div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{backgroundColor:mem.bg}}><span className="text-xl">⏰</span></div><div><h3 className="font-semibold text-slate-700">기상 시간</h3><p className="text-xs text-slate-400">{mem.name}의 기상 시각</p></div></div>
                    <input type="time" value={md.wakeTime||''} onChange={e=>saveRoutine(selectedMember,today,'wakeTime',e.target.value)} className="w-full h-14 text-center text-2xl font-bold text-slate-700 rounded-xl border-2 border-slate-100 focus:outline-none focus:ring-4 transition-all" style={{'--tw-ring-color':mem.color+'30',borderColor:md.wakeTime?mem.color:'#e2e8f0'}}/>
                    {md.wakeTime&&toMin(md.wakeTime)<=420&&(<p className="text-center text-xs font-semibold mt-2" style={{color:mem.color}}>🌅 얼리버드!</p>)}
                  </div>
                  {/* 루틴 */}
                  <div className="grid grid-cols-2 gap-3">
                    <div className={`relative bg-white rounded-2xl border-2 shadow-sm overflow-hidden transition-all ${md.cafe?'border-amber-400':'border-slate-100'}`}>
                      <Confetti active={confetti?.member===selectedMember&&confetti?.type==='cafe'} baseColor="#d97706"/>
                      <div className="p-4"><div className="text-center mb-2"><span className={`text-3xl block mb-1 transition-transform ${md.cafe?'scale-110':''}`}>☕</span><p className="text-sm font-semibold text-slate-700">카페</p></div>
                        <button onClick={()=>{const next=!md.cafe;saveRoutine(selectedMember,today,'cafe',next);if(next)fireConfetti(selectedMember,'cafe');}} className={`w-full py-3 rounded-xl font-bold text-sm transition-all ${md.cafe?'bg-amber-500 text-white shadow-lg shadow-amber-200 hover:bg-amber-600':'bg-amber-50 text-amber-700 border-2 border-dashed border-amber-200 hover:bg-amber-100'}`}>{md.cafe?'✓ 완료!':'체크하기'}</button></div>
                    </div>
                    <div className={`relative bg-white rounded-2xl border-2 shadow-sm overflow-hidden transition-all ${md.swim?'border-cyan-400':'border-slate-100'}`}>
                      <Confetti active={confetti?.member===selectedMember&&confetti?.type==='swim'} baseColor="#0891b2"/>
                      <div className="p-4"><div className="text-center mb-2"><span className={`text-3xl block mb-1 transition-transform ${md.swim?'scale-110':''}`}>🏊</span><p className="text-sm font-semibold text-slate-700">수영</p></div>
                        <button onClick={()=>{const next=!md.swim;saveRoutine(selectedMember,today,'swim',next);if(next)fireConfetti(selectedMember,'swim');}} className={`w-full py-3 rounded-xl font-bold text-sm transition-all ${md.swim?'bg-cyan-500 text-white shadow-lg shadow-cyan-200 hover:bg-cyan-600':'bg-cyan-50 text-cyan-700 border-2 border-dashed border-cyan-200 hover:bg-cyan-100'}`}>{md.swim?'✓ 완료!':'체크하기'}</button></div>
                    </div>
                  </div>
                  {/* ═══ 공부 세션 (study_hours + study_minutes) ═══ */}
                  <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                    <div className="flex items-center justify-between mb-4"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{backgroundColor:mem.bg}}><span className="text-xl">📚</span></div><div><h3 className="font-semibold text-slate-700">공부 세션</h3><p className="text-xs text-slate-400">항목별 시간과 분을 기록하세요</p></div></div><span className="text-sm font-bold px-3 py-1 rounded-full" style={{color:mem.color,backgroundColor:mem.bg}}>총 {fmtHM(totalH)}</span></div>
                    <div className="space-y-2.5 mb-3 max-h-[400px] overflow-y-auto scroll-thin">
                      {md.sessions.map((sess,idx)=>(
                        <div key={sess.id||idx} className="bg-slate-50 rounded-xl p-3 anim-slide" style={{animationDelay:`${idx*50}ms`}}>
                          <div className="flex items-center gap-2 mb-2">
                            <span className="w-2 h-6 rounded-full shrink-0" style={{backgroundColor:mem.color}}/>
                            <input type="text" value={sess.study_content||''} placeholder="항목명 (예: 수학, LLM 연구)"
                              onChange={e=>updateSession(sess.id,'study_content',e.target.value)}
                              className="flex-1 min-w-0 bg-transparent text-sm font-semibold text-slate-700 outline-none placeholder:text-slate-300"/>
                            <button onClick={()=>deleteSession(sess.id)} className="w-7 h-7 rounded-lg flex items-center justify-center text-slate-300 hover:text-red-400 hover:bg-red-50 active:scale-95 shrink-0"><XIcon size={13}/></button>
                          </div>
                          <div className="flex items-center gap-2 ml-4">
                            <div className="flex items-center gap-1 bg-white rounded-lg border border-slate-200 px-1.5 py-1">
                              <button onClick={()=>updateSession(sess.id,'study_hours',Math.max(0,(sess.study_hours||0)-1))} className="w-7 h-7 rounded-md flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 active:scale-95"><MinusIc size={12}/></button>
                              <input type="number" min="0" max="23" value={sess.study_hours||''} placeholder="0" onChange={e=>updateSession(sess.id,'study_hours',Math.max(0,Math.min(23,parseInt(e.target.value)||0)))} className="w-10 h-7 text-center text-sm font-bold outline-none" style={{color:mem.color}}/>
                              <button onClick={()=>updateSession(sess.id,'study_hours',Math.min(23,(sess.study_hours||0)+1))} className="w-7 h-7 rounded-md flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 active:scale-95"><PlusIc size={12}/></button>
                              <span className="text-xs font-semibold text-slate-400 pr-1">시간</span>
                            </div>
                            <div className="flex items-center gap-1 bg-white rounded-lg border border-slate-200 px-1.5 py-1">
                              <button onClick={()=>updateSession(sess.id,'study_minutes',Math.max(0,(sess.study_minutes||0)-5))} className="w-7 h-7 rounded-md flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 active:scale-95"><MinusIc size={12}/></button>
                              <input type="number" min="0" max="59" value={sess.study_minutes||''} placeholder="0" onChange={e=>updateSession(sess.id,'study_minutes',Math.max(0,Math.min(59,parseInt(e.target.value)||0)))} className="w-10 h-7 text-center text-sm font-bold outline-none" style={{color:mem.color}}/>
                              <button onClick={()=>updateSession(sess.id,'study_minutes',Math.min(55,(sess.study_minutes||0)+5))} className="w-7 h-7 rounded-md flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 active:scale-95"><PlusIc size={12}/></button>
                              <span className="text-xs font-semibold text-slate-400 pr-1">분</span>
                            </div>
                            <span className="text-xs font-bold ml-auto whitespace-nowrap" style={{color:mem.color}}>= {fmtHM(sessHrs(sess))}</span>
                          </div>
                        </div>
                      ))}
                      {md.sessions.length===0&&(<p className="text-center text-sm text-slate-300 py-6">아직 세션이 없어요</p>)}
                    </div>
                    <button onClick={()=>addSession(selectedMember,today,'')} className="w-full py-3 rounded-xl border-2 border-dashed font-semibold text-sm flex items-center justify-center gap-2 transition-all hover:shadow-sm active:scale-[0.99]" style={{borderColor:mem.color+'40',color:mem.color,backgroundColor:mem.bg+'80'}}><PlusIc size={16} color={mem.color}/> 공부 항목 추가</button>
                    <div className="flex flex-wrap gap-1.5 mt-3">{['LLM 연구','전공 공부','언어 학습','독서','코딩','기타'].map(name=>(<button key={name} onClick={()=>{if(!md.sessions.some(s=>s.study_content===name))addSession(selectedMember,today,name);}} className="px-2.5 py-1 rounded-lg text-[11px] font-medium bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">+ {name}</button>))}</div>
                  </div>
                </div>);
            })()}
          </div>
        )}

        {/* ════════ RANKING ════════ */}
        {tab==='ranking'&&(
          <div className="anim-slide space-y-5">
            {weekStudy[0]?.total>0&&(<div className="relative rounded-2xl p-5 text-center overflow-hidden" style={{background:`linear-gradient(135deg, ${weekStudy[0].color}15, ${weekStudy[0].color}05)`}}><div className="relative z-10"><span className="text-4xl block mb-1 crown-glow">👑</span><span className="text-4xl block mb-2 trophy-bounce">{weekStudy[0].emoji}</span><p className="text-sm font-bold text-slate-700">이번 주 1등!</p><p className="text-2xl font-black mt-1" style={{color:weekStudy[0].color}}>{weekStudy[0].name} — {fmtHM(weekStudy[0].total)}</p><p className="text-xs text-slate-400 mt-1">🎉 축하합니다!</p></div>{Array.from({length:6},(_,i)=>(<span key={i} className="absolute sparkle-star text-lg pointer-events-none" style={{left:`${10+i*15}%`,top:`${20+Math.sin(i)*30}%`,animationDelay:`${i*0.3}s`,opacity:0.6}}>{['✨','⭐','💫','🌟','✨','⭐'][i]}</span>))}</div>)}
            <div className="text-center"><p className="text-sm text-slate-400 font-medium">이번 주 공부 시간 랭킹</p><p className="text-xs text-slate-300 mt-0.5">{weekDates[0]} ~ {weekDates[6]}</p></div>
            <div className="flex items-end justify-center gap-3 pt-4 pb-2">
              {(()=>{const order=weekStudy.length>=3?[weekStudy[1],weekStudy[0],weekStudy[2]]:weekStudy;const heights=[120,160,100];const medals=['🥈','🥇','🥉'];const po=weekStudy.length>=3?[1,0,2]:[0,1,2];return order.map((ws,vi)=>{const rank=po[vi],isF=rank===0;return(<div key={ws.id} className="flex flex-col items-center anim-slide" style={{animationDelay:`${vi*100}ms`}}><span className={`text-2xl mb-1 ${isF?'anim-pop':''}`}>{medals[vi]}</span><div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl mb-2 border-3 shadow-lg ${isF?'ring-4 ring-yellow-200':''}`} style={{backgroundColor:ws.bg,borderColor:ws.color,boxShadow:`0 4px 16px ${ws.color}25`}}>{ws.emoji}</div><p className="text-xs font-bold text-slate-700 mb-1">{ws.name}</p><div className="rounded-t-xl flex items-end justify-center pb-2" style={{width:80,height:heights[vi],background:`linear-gradient(to top, ${ws.color}, ${ws.color}90)`}}><span className="text-white font-extrabold text-sm leading-tight text-center px-1">{fmtHM(ws.total)}</span></div></div>);});})()}
            </div>
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"><h3 className="text-sm font-bold text-slate-700 mb-4">주간 누적 공부 시간</h3><div className="space-y-4">{weekStudy.map((ws,i)=>{const pct=maxStudy>0?(ws.total/maxStudy)*100:0;return(<div key={ws.id} className="anim-slide" style={{animationDelay:`${i*80}ms`}}><div className="flex items-center justify-between mb-1.5"><div className="flex items-center gap-2"><span className="text-lg">{ws.emoji}</span><span className="text-sm font-semibold text-slate-700">{ws.name}</span>{i===0&&ws.total>0&&<span className="text-sm anim-pop">🥇</span>}</div><span className="text-sm font-extrabold" style={{color:ws.color}}>{fmtHM(ws.total)}</span></div><div className="h-8 bg-slate-100 rounded-xl overflow-hidden"><div className="h-full rounded-xl flex items-center transition-all duration-1000" style={{width:`${Math.max(pct,2)}%`,backgroundColor:ws.color}}>{pct>20&&<span className="text-white text-xs font-bold ml-3">{fmtHM(ws.total)}</span>}</div></div></div>);})}</div></div>
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"><h3 className="text-sm font-bold text-slate-700 mb-3">일별 공부 시간</h3><div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr className="border-b border-slate-100"><th className="py-2 text-left text-slate-400 font-medium">날짜</th>{MEMBERS.map(m=><th key={m.id} className="py-2 text-center font-semibold" style={{color:m.color}}>{m.emoji} {m.name}</th>)}</tr></thead><tbody>{weekDates.map(d=>{const isT=d===today;return(<tr key={d} className={`border-b border-slate-50 ${isT?'bg-blue-50/40':''}`}><td className={`py-2 font-medium ${isT?'text-blue-600':'text-slate-500'}`}>{DAYS[new Date(d).getDay()]} {d.slice(5)}</td>{MEMBERS.map(m=>{const h=totalSessHrs(allData[d]?.[m.id]?.sessions);return<td key={m.id} className="py-2 text-center font-bold" style={{color:h>0?m.color:'#cbd5e1'}}>{h>0?fmtHM(h):'-'}</td>;})}</tr>);})}</tbody></table></div></div>
            <div className="grid grid-cols-3 gap-3">{MEMBERS.map(m=>{let streak=0;const d=new Date(today);while(true){const k=d.toISOString().slice(0,10);if(totalSessHrs(allData[k]?.[m.id]?.sessions)<=0)break;streak++;d.setDate(d.getDate()-1);}return(<div key={m.id} className="bg-white rounded-xl border border-slate-100 p-3 text-center"><span className="text-lg">{m.emoji}</span><p className="text-[10px] text-slate-400 mt-1">연속 공부</p><p className="text-lg font-extrabold" style={{color:m.color}}>{streak}일</p></div>);})}</div>
          </div>
        )}

        {/* ════════ FOOD ════════ */}
        {tab==='food'&&(
          <div className="anim-slide space-y-5">
            <div className="bg-gradient-to-br from-orange-500 to-amber-500 rounded-2xl p-6 text-white shadow-lg shadow-orange-200 relative overflow-hidden"><div className="absolute top-3 right-4 text-5xl opacity-20">🍽️</div><p className="text-sm font-medium text-orange-100">이번 달 공통 식비</p><p className="text-4xl font-black mt-1">{fmtWon(foodMonthTotal)}<span className="text-lg font-bold ml-1">원</span></p><p className="text-xs text-orange-200 mt-1">{foodYear}년 {foodMonth+1}월 | {foodMonthItems.length}건</p></div>
            <div className="flex items-center justify-between">
              <button onClick={()=>{let nm=foodMonth-1,ny=foodYear;if(nm<0){nm=11;ny--;}setFoodMonth(nm);setFoodYear(ny);}} className="w-9 h-9 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 active:scale-95"><ChevL size={16} color="#475569"/></button>
              <div className="text-center"><span className="text-sm font-bold text-slate-700">{foodYear}년 {foodMonth+1}월</span><button onClick={()=>{setFoodYear(new Date().getFullYear());setFoodMonth(new Date().getMonth())}} className="block mx-auto text-[10px] text-blue-500 hover:underline">이번 달</button></div>
              <button onClick={()=>{let nm=foodMonth+1,ny=foodYear;if(nm>11){nm=0;ny++;}setFoodMonth(nm);setFoodYear(ny);}} className="w-9 h-9 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 active:scale-95"><ChevR size={16} color="#475569"/></button>
            </div>
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"><h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span className="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center text-base">✏️</span>새 지출 추가</h3>
              <div className="space-y-3">
                <div><label className="text-[11px] font-semibold text-slate-400 block mb-1">날짜</label><input type="date" value={newFood.date} onChange={e=>setNewFood(p=>({...p,date:e.target.value}))} className="w-full h-11 px-3 text-sm font-medium text-slate-700 rounded-xl border-2 border-slate-100 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 outline-none transition-all"/></div>
                <div><label className="text-[11px] font-semibold text-slate-400 block mb-1">품목명</label><input type="text" value={newFood.name} placeholder="예: 마트 장보기, 가족 외식" onChange={e=>setNewFood(p=>({...p,name:e.target.value}))} className="w-full h-11 px-3 text-sm font-medium text-slate-700 rounded-xl border-2 border-slate-100 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 outline-none transition-all placeholder:text-slate-300"/></div>
                <div><label className="text-[11px] font-semibold text-slate-400 block mb-1">금액 (원)</label><div className="relative"><input type="number" value={newFood.amount} placeholder="0" onChange={e=>setNewFood(p=>({...p,amount:e.target.value}))} className="w-full h-11 px-3 pr-10 text-sm font-bold text-slate-700 rounded-xl border-2 border-slate-100 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 outline-none transition-all placeholder:text-slate-300"/><span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold text-slate-400">원</span></div></div>
                <div className="flex flex-wrap gap-1.5">{[5000,10000,15000,20000,30000,50000].map(a=>(<button key={a} onClick={()=>setNewFood(p=>({...p,amount:String(a)}))} className="px-2.5 py-1 rounded-lg text-[11px] font-medium bg-orange-50 text-orange-600 hover:bg-orange-100 transition-colors">{fmtWon(a)}</button>))}</div>
                <button onClick={handleAddFood} disabled={!newFood.name||!newFood.amount} className="w-full py-3 rounded-xl font-bold text-sm transition-all bg-orange-500 text-white shadow-lg shadow-orange-200 hover:bg-orange-600 disabled:opacity-40 disabled:shadow-none active:scale-[0.99]">+ 지출 추가하기</button>
              </div>
            </div>
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"><h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span className="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center text-base">📋</span>지출 내역<span className="text-xs font-normal text-slate-400 ml-auto">{foodMonthItems.length}건</span></h3>
              <div className="space-y-2 max-h-[400px] overflow-y-auto scroll-thin">
                {foodMonthItems.length===0&&(<div className="text-center py-8"><span className="text-3xl block mb-2">🧾</span><p className="text-sm text-slate-300">이번 달 지출 내역이 없어요</p></div>)}
                {(()=>{let ld='';return foodMonthItems.map(f=>{const sd=f.date!==ld;ld=f.date;const dw=DAYS[new Date(f.date).getDay()];return(<div key={f.id}>{sd&&(<p className="text-[11px] font-semibold text-slate-400 mt-3 mb-1">📅 {f.date.slice(5)} ({dw})</p>)}<div className="flex items-center gap-3 bg-slate-50 rounded-xl px-4 py-3 group"><div className="flex-1 min-w-0"><p className="text-sm font-medium text-slate-700 truncate">{f.name}</p></div><span className="text-sm font-extrabold text-orange-600 whitespace-nowrap">{fmtWon(f.amount)}원</span><button onClick={()=>deleteFoodItem(f.id)} className="w-7 h-7 rounded-lg flex items-center justify-center text-slate-200 hover:text-red-400 hover:bg-red-50 active:scale-95 opacity-0 group-hover:opacity-100 transition-all shrink-0"><XIcon size={13}/></button></div></div>);});})()}
              </div>
              {foodMonthItems.length>0&&(<div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between"><span className="text-xs font-semibold text-slate-400">이번 달 합계</span><span className="text-lg font-black text-orange-600">{fmtWon(foodMonthTotal)}원</span></div>)}
            </div>
          </div>
        )}
      </main>

      <footer className="text-center py-6 text-[10px] text-slate-300">Family Study Tracker | Supabase Realtime</footer>

      <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 sm:hidden z-40">
        <div className="flex">
          {[['calendar','📅','달력'],['input','✏️','입력'],['ranking','🏆','랭킹'],['food','🍽️','식비']].map(([k,icon,label])=>(
            <button key={k} onClick={()=>setTab(k)} className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 text-[10px] font-semibold transition-colors ${tab===k?'text-slate-800':'text-slate-400'}`}><span className="text-lg">{icon}</span>{label}</button>
          ))}
        </div>
      </div>
      <div className="h-16 sm:hidden"/>
      <DayModal dateStr={selectedDate} allData={allData} onClose={()=>setSelectedDate(null)}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
